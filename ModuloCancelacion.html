<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fef2f2; font-family: sans-serif; }
        .btn-anular { background-color: #dc2626; color: white; transition: all 0.3s; }
        .btn-anular:hover { background-color: #991b1b; }
        .pago-card:hover { border-color: #dc2626; background-color: #fff5f5; }
    </style>
</head>
<body class="p-4">

<div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-6 border-t-8 border-red-600">
    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
        🛑 Cancelación de Pagos (ADMIN)
    </h2>
    
    <div class="mb-5">
        <label class="block text-sm font-bold text-gray-600 mb-1">Unidad / Departamento:</label>
        <select id="ui_unidad" onchange="ui_cargarPagos()" class="w-full p-2 border-2 rounded-lg focus:border-red-400 outline-none">
            <option value="">-- Seleccione Unidad --</option>
        </select>
    </div>

    <div id="ui_contenedor_pagos" class="hidden mb-5">
        <p class="text-xs font-bold text-gray-500 mb-2 uppercase">Seleccione el pago a revertir:</p>
        <div id="ui_lista" class="space-y-2 max-height-[250px] overflow-y-auto border p-2 rounded-lg">
            </div>
    </div>

    <div id="ui_confirmacion" class="hidden space-y-3 p-4 bg-red-50 rounded-lg border border-red-200">
        <div id="ui_resumen" class="text-sm border-b border-red-200 pb-2"></div>
        <p class="text-[10px] text-red-600 font-bold uppercase">Requiere Clave de Administrador:</p>
        <input type="password" id="ui_clave" placeholder="Ingrese Clave ADMIN" 
               class="w-full p-2 border-2 border-red-300 rounded focus:border-red-600 outline-none text-center">
        <button onclick="ui_ejecutar()" id="ui_btn_final" class="w-full btn-anular font-bold py-2 rounded-lg shadow-md">
            CONFIRMAR ANULACIÓN
        </button>
    </div>

    <div id="ui_status" class="mt-4 text-sm text-center font-medium"></div>
</div>

<script>
    let p_seleccionado = null;

    // Cargar unidades al iniciar
    window.onload = () => {
        // Usamos tu función original getUnitList pero con los nombres de este UI
        google.script.run.withSuccessHandler(res => {
            const select = document.getElementById('ui_unidad');
            res.units.forEach(u => {
                let opt = document.createElement('option');
                opt.value = u.id;
                opt.text = `${u.departamento} - ${u.propietario}`;
                select.add(opt);
            });
        }).getUnitList();
    };

    function ui_cargarPagos() {
        const id = document.getElementById('ui_unidad').value;
        if (!id) return;
        
        document.getElementById('ui_status').innerText = "Buscando...";
        google.script.run.withSuccessHandler(pagos => {
            const lista = document.getElementById('ui_lista');
            const cont = document.getElementById('ui_contenedor_pagos');
            lista.innerHTML = "";
            document.getElementById('ui_confirmacion').classList.add('hidden');

            if (pagos.length === 0) {
                document.getElementById('ui_status').innerText = "No hay pagos activos.";
                cont.classList.add('hidden');
                return;
            }

            document.getElementById('ui_status').innerText = "";
            cont.classList.remove('hidden');

            pagos.forEach(p => {
                const div = document.createElement('div');
                div.className = "pago-card p-3 border-2 rounded-lg cursor-pointer transition flex justify-between items-center";
                div.innerHTML = `
                    <div class="text-xs">
                        <span class="font-bold block text-gray-700">${p.idPago}</span>
                        <span class="text-gray-500">${p.fecha}</span>
                    </div>
                    <div class="font-bold text-red-600">$${p.monto.toFixed(2)}</div>
                `;
                div.onclick = () => {
                    p_seleccionado = p;
                    document.getElementById('ui_confirmacion').classList.remove('hidden');
                    document.getElementById('ui_resumen').innerHTML = `<b>CANCELAR:</b> ${p.idPago} por <b>$${p.monto.toFixed(2)}</b>`;
                };
                lista.appendChild(div);
            });
        }).ADMIN_obtenerPagosPorUnidad(id);
    }

    function ui_ejecutar() {
        const clave = document.getElementById('ui_clave').value;
        const btn = document.getElementById('ui_btn_final');

        if (!clave) return alert("Ingrese la clave");

        btn.disabled = true;
        btn.innerText = "Anulando...";

        google.script.run.withSuccessHandler(res => {
            alert(res.message);
            if (res.success) {
                google.script.host.close(); // Cierra el diálogo al terminar
            } else {
                btn.disabled = false;
                btn.innerText = "CONFIRMAR ANULACIÓN";
            }
        }).ADMIN_ejecutarAnulacionConClave(p_seleccionado.idPago, clave);
    }
</script>
</body>
</html>
