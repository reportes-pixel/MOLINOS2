<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .select2-container .select2-selection--single {
            height: 42px !important;
            border: 2px solid #e5e7eb !important;
            border-radius: 0.5rem !important;
            display: flex;
            align-items: center;
        }
        .select2-container--default .select2-selection--single .select2-selection__arrow { height: 40px !important; }

        /* Magia para que al imprimir solo salga el ticket */
        @media print {
            body { background-color: white; padding: 0; }
            .no-print { display: none !important; }
            .container { max-width: 100%; box-shadow: none; padding: 0; border: none; }
        }
    </style>
</head>
<body>

<div class="container p-4 bg-white shadow-xl rounded-xl border-t-8 border-green-500">
    
    <div id="areaFormulario">
        <h2 class="text-2xl font-bold mb-2 text-green-700 flex items-center"><i class="fas fa-fast-forward mr-2"></i> Pago Adelantado</h2>
        <p class="text-xs text-gray-500 mb-6 border-b pb-4">Genera mensualidades futuras a precio de <b>Pronto Pago</b> y emite el comprobante en un solo paso.</p>
        
        <div id="resultado" class="mb-4 text-center text-sm"></div>

        <form id="adelantoForm" onsubmit="enviarAdelanto(event)" class="space-y-4">
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Unidad que pagará:</label>
                <select id="idUnidad" required class="w-full outline-none focus:border-green-500">
                    <option value="">Cargando unidades...</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Atendido Por:</label>
                <div id="contenedorCapturistaText">
                    <input type="text" id="capturistaInput" name="capturista" readonly class="w-full border-2 border-gray-200 rounded-lg p-2 bg-gray-100 text-gray-600 font-bold outline-none" placeholder="Detectando usuario...">
                </div>
                <div id="contenedorCapturistaSelect" class="hidden">
                    <select id="capturistaSelect" class="w-full border-2 border-gray-200 rounded-lg p-2 outline-none focus:border-green-500">
                        <option value="">Cargando capturistas...</option>
                    </select>
                </div>
            </div>
            
            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Meses a pagar:</label>
                    <input type="number" id="numMeses" min="1" max="24" required class="w-full p-2 border-2 border-gray-200 rounded-lg outline-none focus:border-green-500 font-bold text-lg" placeholder="Ej: 6">
                </div>
                <div class="w-1/2">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Mes de Inicio:</label>
                    <input type="month" id="mesInicio" required readonly class="w-full p-2 border-2 border-gray-200 rounded-lg outline-none bg-gray-100 text-gray-500 cursor-not-allowed font-bold" title="Este campo se calcula automáticamente">
                </div>
            </div>
            
            <button id="btn_procesar" type="submit" disabled class="w-full mt-4 bg-green-600 text-white font-bold py-3.5 rounded-lg shadow-md hover:bg-green-700 transition disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center">
                <i class="fas fa-check-circle mr-2"></i> COBRAR Y GENERAR TICKET
            </button>
        </form>
    </div>

    <div id="areaTicket" class="hidden">
        <div class="flex justify-between items-center mb-4 border-b pb-2 no-print">
            <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-receipt text-green-600 mr-2"></i>Recibo de Adelanto</h2>
            <button type="button" onclick="reiniciarFormulario()" class="text-green-600 font-bold hover:underline transition">
                <i class="fas fa-arrow-left mr-1"></i> Nuevo Adelanto
            </button>
        </div>

        <div class="bg-white border-2 border-gray-200 p-2 rounded-lg mb-4 flex justify-center shadow-sm">
            <iframe id="ticketFrame" class="w-full h-[350px] border-0" srcdoc="<div style='text-align:center; padding:20px; color:gray; font-family:sans-serif; font-weight:bold;'><br><br><br>Dibujando ticket...</div>"></iframe>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3 no-print">
            <button type="button" onclick="imprimirTicket()" class="bg-gray-800 text-white font-bold py-3 rounded-lg shadow hover:bg-gray-700 transition">
                <i class="fas fa-print mr-2"></i> Imprimir
            </button>
            <button type="button" onclick="mostrarOpcionCorreo()" class="bg-green-600 text-white font-bold py-3 rounded-lg shadow hover:bg-green-700 transition">
                <i class="fas fa-envelope mr-2"></i> Enviar Correo
            </button>
        </div>

        <div id="cajaCorreo" class="hidden bg-green-50 p-4 rounded-lg border border-green-200 mt-3 no-print transition">
            <label class="block text-sm font-bold text-green-900 mb-2">Correo Electrónico del Residente:</label>
            <div class="flex flex-col gap-3 sm:flex-row sm:gap-2">
                <input type="email" id="emailDestino" class="w-full p-3 text-base border-2 border-green-200 rounded-lg outline-none focus:border-green-500 bg-white" placeholder="ejemplo@correo.com">
                <button type="button" onclick="enviarTicketPorCorreo()" id="btnEnviarCorreo" class="w-full sm:w-auto bg-green-600 text-white font-bold px-4 py-2 rounded-lg hover:bg-green-700 transition shadow">
                    Enviar Correo
                </button>
            </div>
            <div id="msgCorreo" class="text-sm font-bold mt-3 text-center hidden"></div>
        </div>
    </div>

</div>

<script>
    let unidadesList = [];
    let lastProcessedIdPago = null; 
    let usuarioWebRecibido = false;
    
    // ESCUCHA EL MENSAJE DE LA WEB APP (PARA EL CAPTURISTA)
    window.addEventListener('message', function(event) {
        if(event.data && event.data.usuarioActivo) {
            document.getElementById('capturistaInput').value = event.data.usuarioActivo;
            usuarioWebRecibido = true;
        }
    });

    $(document).ready(function() {
        // Cargar unidades
        google.script.run.withSuccessHandler(res => {
            const $sel = $('#idUnidad');
            $sel.empty();
            $sel.append('<option value="">Seleccione Unidad...</option>');
            unidadesList = res.units;
            res.units.forEach(u => $sel.append(`<option value="${u.id}" data-email="${u.email || ''}">${u.departamento} (${u.propietario})</option>`));
            
            $sel.select2({
                width: '100%',
                placeholder: "Buscar unidad o propietario..."
            });

            // Al elegir unidad, buscar el mes
            $sel.on('change', function() {
                const id = $(this).val();
                if(id) {
                    $('#mesInicio').val('');
                    $('#resultado').html('<p class="text-blue-500 font-bold"><i class="fas fa-spinner fa-spin mr-1"></i> Calculando el mes siguiente disponible...</p>');
                    $('#btn_procesar').prop('disabled', true);
                    
                    google.script.run.withSuccessHandler(mesCalculado => {
                        $('#mesInicio').val(mesCalculado);
                        $('#resultado').html('');
                        $('#btn_procesar').prop('disabled', false);
                    }).obtenerMesInicioAdelanto(id);
                } else {
                    $('#mesInicio').val('');
                    $('#btn_procesar').prop('disabled', true);
                }
            });
        }).getUnitList();
        
        // Timeout de seguridad para Capturista en Excel
        setTimeout(() => {
            if(!usuarioWebRecibido) {
                document.getElementById('contenedorCapturistaText').classList.add('hidden');
                document.getElementById('contenedorCapturistaSelect').classList.remove('hidden');
                
                google.script.run.withSuccessHandler(res => {
                    const sel = document.getElementById('capturistaSelect');
                    res.capturistas.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
                    if(res.capturistas.length > 0) sel.value = res.capturistas[0];
                }).getCapturistaList();
            }
        }, 1500);
    });

    function enviarAdelanto(e) {
        e.preventDefault();
        
        const idUnidad = $('#idUnidad').val();
        const numMeses = $('#numMeses').val();
        const mesInicio = $('#mesInicio').val();
        const capturistaDefinitivo = usuarioWebRecibido ? document.getElementById('capturistaInput').value : document.getElementById('capturistaSelect').value;
        
        const unidadInfo = unidadesList.find(u => u.id === idUnidad);
        const nombreText = unidadInfo ? `${unidadInfo.departamento} (${unidadInfo.propietario})` : idUnidad;
        
        // Cálculo del Total (Asumiendo tarifa base de 380 que tenías configurada en tu código)
        // NOTA: Lo ideal sería traerlo desde la BD, pero mantenemos tu lógica exacta.
        const total = (parseInt(numMeses) * 380).toFixed(2); 
        
        const [yyyy, mm] = mesInicio.split('-');
        const nombreMeses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const mesNombre = nombreMeses[parseInt(mm)-1];
        
        const confirmMsg = `¿Confirmas el pago de ${numMeses} mes(es) por adelantado para la unidad ${nombreText}?\n\n` +
                           `▶ Inicia a partir de: ${mesNombre} ${yyyy}\n` +
                           `▶ Total a cobrar: $${total}\n\n` +
                           `Se generarán las cuotas futuras automáticamente.`;
                           
        if(!confirm(confirmMsg)) { return; }

        const btnProcesar = document.getElementById('btn_procesar');
        btnProcesar.disabled = true;
        btnProcesar.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Procesando...';
        document.getElementById('resultado').innerHTML = "";
        
        const data = {
            idUnidad: idUnidad,
            capturista: capturistaDefinitivo,
            numMeses: numMeses,
            mesInicioStr: mesInicio + "-01" 
        };

        google.script.run.withSuccessHandler(res => {
            if(res.success) {
                lastProcessedIdPago = res.idPago;
                
                // Transición de pantalla a Ticket
                document.getElementById('areaFormulario').classList.add('hidden');
                document.getElementById('areaTicket').classList.remove('hidden');
                
                // Extraer correo de la unidad para prellenarlo
                const emailUnidad = $('#idUnidad').select2('data')[0].element.dataset.email;
                if(emailUnidad) document.getElementById('emailDestino').value = emailUnidad;

                // Pedir el HTML del ticket y aislarlo en el iFrame
                google.script.run.withSuccessHandler(htmlResult => {
                    if(htmlResult.success) {
                        document.getElementById('ticketFrame').srcdoc = htmlResult.html;
                    } else {
                        document.getElementById('ticketFrame').srcdoc = '<div style="color:red; text-align:center; margin-top:20px;">Error al dibujar ticket.</div>';
                    }
                }).generatePaymentTicketHtml(res.idPago, true);

            } else {
                document.getElementById('resultado').innerHTML = `<p class="text-red-600 font-bold p-2 bg-red-100 rounded">❌ Error: ${res.message}</p>`;
                btnProcesar.disabled = false;
                btnProcesar.innerHTML = '<i class="fas fa-check-circle mr-2"></i> COBRAR Y GENERAR TICKET';
            }
        }).withFailureHandler(err => {
            document.getElementById('resultado').innerHTML = `<p class="text-red-600 font-bold p-2 bg-red-100 rounded">❌ Error del servidor: ${err.message}</p>`;
            btnProcesar.disabled = false;
            btnProcesar.innerHTML = '<i class="fas fa-check-circle mr-2"></i> COBRAR Y GENERAR TICKET';
        }).procesarAdelantoMensualidades(data);
    }

    // --- FUNCIONES DEL ÁREA DEL TICKET ---

    function imprimirTicket() {
        const iframe = document.getElementById('ticketFrame');
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
    }

    function mostrarOpcionCorreo() {
        document.getElementById('cajaCorreo').classList.remove('hidden');
    }

    function enviarTicketPorCorreo() {
        const email = document.getElementById('emailDestino').value.trim();
        const btn = document.getElementById('btnEnviarCorreo');
        const msg = document.getElementById('msgCorreo');

        if(!email || !email.includes('@')) {
            msg.innerText = "Por favor, ingresa un correo válido.";
            msg.className = "text-sm font-bold mt-3 text-center text-red-500 block";
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
        msg.innerText = "Enviando correo...";
        msg.className = "text-sm font-bold mt-3 text-center text-green-600 block";

        google.script.run.withSuccessHandler(res => {
            btn.disabled = false;
            btn.innerHTML = 'Enviar Correo';
            msg.innerText = res.message;
            msg.className = res.success ? "text-sm font-bold mt-3 text-center text-green-600 block" : "text-sm font-bold mt-3 text-center text-red-600 block";
        }).enviarTicketPorCorreo(lastProcessedIdPago, email);
    }

    function reiniciarFormulario() {
        document.getElementById('adelantoForm').reset();
        $('#idUnidad').val(null).trigger('change');
        document.getElementById('mesInicio').value = '';
        document.getElementById('resultado').innerHTML = '';
        
        const btnProcesar = document.getElementById('btn_procesar');
        btnProcesar.disabled = true;
        btnProcesar.innerHTML = '<i class="fas fa-check-circle mr-2"></i> COBRAR Y GENERAR TICKET';
        
        // Limpiamos el iframe y ocultamos el ticket
        document.getElementById('ticketFrame').srcdoc = "<div style='text-align:center; padding:20px; color:gray; font-family:sans-serif; font-weight:bold;'><br><br><br>Dibujando ticket...</div>";
        document.getElementById('areaTicket').classList.add('hidden');
        document.getElementById('cajaCorreo').classList.add('hidden');
        document.getElementById('msgCorreo').classList.add('hidden');
        
        // Mostramos el form de nuevo
        document.getElementById('areaFormulario').classList.remove('hidden');
    }
</script>
</body>
</html>
