<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; }
        .debt-list { max-height: 200px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 0.375rem; }
        .debt-item { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background-color 0.2s; }
        .debt-item:last-child { border-bottom: none; }
        .debt-item.selected { background-color: #dbeafe; }
        .debt-item:hover:not(.selected) { background-color: #f0f4f8; }
        
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .select2-container .select2-selection--single {
            height: 38px !important;
            border: 1px solid #d1d5db !important;
            border-radius: 0.375rem !important;
            display: flex;
            align-items: center;
        }
        .select2-container--default .select2-selection--single .select2-selection__arrow { height: 36px !important; }
    </style>
</head>
<body>

<div class="container p-4 bg-white shadow-xl rounded-lg border-t-4 border-indigo-600">
    
    <div id="areaFormulario">
        <div class="flex justify-between items-center mb-6 border-b pb-2">
            <h1 class="text-2xl font-bold text-gray-800">Registro de Pagos</h1>
        </div>
        
        <div id="messages" class="mb-4"></div>

        <form id="paymentForm" onsubmit="submitPayment(event)" class="space-y-4">
            
            <div>
                <label for="idUnidad" class="block text-sm font-bold text-gray-700">Unidad/Departamento</label>
                <select id="idUnidad" name="idUnidad" required class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md shadow-sm">
                    <option value="">Cargando unidades...</option>
                </select>
                <p id="unitInfo" class="mt-1 text-xs text-gray-500 font-bold"></p>
            </div>

            <div>
                <label for="capturista" class="block text-sm font-medium text-gray-700">Atendido Por</label>
                <div id="contenedorCapturistaText">
                    <input type="text" id="capturistaInput" name="capturista" readonly class="mt-1 block w-full shadow-sm sm:text-sm border-gray-300 bg-gray-100 text-gray-600 font-bold rounded-md p-2" placeholder="Detectando usuario...">
                </div>
                <div id="contenedorCapturistaSelect" class="hidden">
                    <select id="capturistaSelect" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md shadow-sm">
                        <option value="">Cargando capturistas...</option>
                    </select>
                </div>
            </div>
            
            <div>
                <label for="montoRecibido" class="block text-sm font-bold text-gray-700">Monto Recibido ($)</label>
                <input type="number" id="montoRecibido" name="montoRecibido" required min="0.00" step="0.01" oninput="calculateBalance()" placeholder="0.00" class="mt-1 block w-full shadow-sm sm:text-sm border-2 border-gray-300 focus:border-indigo-500 outline-none rounded-md p-2 font-bold text-lg">
            </div>
            
            <div>
                <label for="fechaPago" class="block text-sm font-bold text-gray-700">Fecha de Pago</label>
                <input type="date" id="fechaPago" name="fechaPago" required class="mt-1 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md p-2 bg-gray-50">
            </div>

            <div id="debtSummary" class="p-3 bg-indigo-50 text-indigo-800 text-sm rounded-lg shadow-inner space-y-1">
                <p class="font-semibold">Resumen de Deuda:</p>
                <p id="totalPendienteLabel">Deuda Bruta: <strong class="text-red-600">$0.00</strong></p>
                <p id="saldoAFavorLabel" class="text-green-700">Saldo a Favor Disponible: <strong class="text-green-700">$0.00</strong></p>
                <hr class="border-indigo-200 my-1">
                <p id="montoNetoPendienteLabel" class="text-base font-bold">Total Neto a Pagar: <strong class="text-red-700">$0.00</strong></p>
            </div>
            
            <div id="debtListContainer" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-2">Seleccione Deudas a Cubrir:</label>
                <div id="debtList" class="debt-list bg-white">
                    <p class="p-3 text-gray-500">Seleccione una unidad para ver sus deudas.</p>
                </div>
                <p id="aplicacionPago" class="mt-2 text-sm font-medium text-gray-700">Monto aplicado a deudas: <strong class="text-blue-600">$0.00</strong></p>
                <p id="saldoTransaccion" class="mt-1 text-sm font-medium text-gray-700">Saldo final de la transacción: <strong class="text-blue-600">$0.00</strong></p>
            </div>
            
            <div class="flex space-x-2 pt-2"> 
                <button id="btn_procesar" type="submit" disabled 
                        class="w-full flex-1 justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out disabled:bg-gray-400">
                    <i class="fas fa-check-circle mr-2"></i> Procesar y Generar Ticket
                </button>
            </div>
        </form>
    </div>

    <div id="areaTicket" class="hidden">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-receipt text-indigo-500 mr-2"></i>Recibo de Pago</h2>
            <button type="button" onclick="reiniciarFormulario()" class="text-indigo-600 font-bold hover:underline transition">
                <i class="fas fa-arrow-left mr-1"></i> Nuevo Pago
            </button>
        </div>

        <div class="bg-white border-2 border-gray-200 p-2 rounded-lg mb-4 flex justify-center shadow-sm">
            <iframe id="ticketFrame" class="w-full h-[350px] border-0" srcdoc="<div style='text-align:center; padding:20px; color:gray; font-family:sans-serif; font-weight:bold;'><br><br><br>Dibujando ticket...</div>"></iframe>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <button type="button" onclick="imprimirTicket()" class="bg-gray-800 text-white font-bold py-3 rounded-lg shadow hover:bg-gray-700 transition">
                <i class="fas fa-print mr-2"></i> Imprimir
            </button>
            <button type="button" onclick="mostrarOpcionCorreo()" class="bg-blue-600 text-white font-bold py-3 rounded-lg shadow hover:bg-blue-700 transition">
                <i class="fas fa-envelope mr-2"></i> Enviar Correo
            </button>
        </div>

        <div id="cajaCorreo" class="hidden bg-blue-50 p-4 rounded-lg border border-blue-200 mt-3 transition">
            <label class="block text-sm font-bold text-blue-900 mb-2">Correo Electrónico del Residente:</label>
            <div class="flex flex-col gap-3">
                <input type="email" id="emailDestino" class="w-full p-3 text-base border-2 border-blue-200 rounded-lg outline-none focus:border-blue-500 bg-white" placeholder="ejemplo@correo.com">
                <button type="button" onclick="enviarTicketPorCorreo()" id="btnEnviarCorreo" class="w-full bg-blue-600 text-white font-bold px-4 py-3 rounded-lg hover:bg-blue-700 transition shadow">
                    Enviar Correo
                </button>
            </div>
            <div id="msgCorreo" class="text-sm font-bold mt-3 text-center hidden"></div>
        </div>
    </div>

</div>

<script>
    // Variables globales
    let globalUnitDebtData = {};
    let globalUnits = [];
    let globalCapturistas = [];
    let lastProcessedIdPago = null; 
    let usuarioWebRecibido = false;
    let modoWeb = false;
    
    // ESCUCHA EL MENSAJE DE LA WEB APP (PARA EL CAPTURISTA)
    window.addEventListener('message', function(event) {
        if(event.data && event.data.usuarioActivo) {
            document.getElementById('capturistaInput').value = event.data.usuarioActivo;
            usuarioWebRecibido = true;
            modoWeb = true;
        }
    });

    $(document).ready(function() {
        google.script.run.withSuccessHandler(initializeForm).getUnitList();
        
        setTimeout(() => {
            if(!usuarioWebRecibido) {
                document.getElementById('contenedorCapturistaText').classList.add('hidden');
                document.getElementById('contenedorCapturistaSelect').classList.remove('hidden');
                document.getElementById('capturistaInput').name = "capturista_ignorado";
                document.getElementById('capturistaSelect').name = "capturista";
                google.script.run.withSuccessHandler(handleCapturistas).getCapturistaList();
            }
        }, 1500);

        const today = new Date().toISOString().substring(0, 10);
        $('#fechaPago').val(today);
    });
    
    function initializeForm(result) {
        const $unitSelect = $('#idUnidad');
        
        if (result.error) {
            $('#messages').html(`<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative">Error: ${result.error}</div>`);
            return;
        }
        
        globalUnits = result.units || [];
        
        if ($unitSelect.hasClass("select2-hidden-accessible")) { $unitSelect.select2('destroy'); }
        $unitSelect.empty();
        $unitSelect.append('<option value="">Seleccione Unidad...</option>');
        
        if (globalUnits.length === 0) {
            $('#messages').html('<div class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded relative">No hay unidades registradas.</div>');
            return;
        }

        globalUnits.forEach(unit => {
            $unitSelect.append(`<option value="${unit.id}" data-email="${unit.email || ''}">${unit.departamento} (${unit.propietario})</option>`);
        });

        $unitSelect.select2({
            width: '100%',
            placeholder: "Buscar unidad o propietario...",
            language: { noResults: function() { return "No se encontró la unidad"; } }
        });

        $unitSelect.off('select2:select').on('select2:select', function (e) {
            loadDebt();
        });
    }

    function handleCapturistas(result) {
        const $capturistaSelect = $('#capturistaSelect');
        if (result.error) return;
        
        $capturistaSelect.empty();
        $capturistaSelect.append('<option value="">Seleccione Capturista</option>');
        
        globalCapturistas = result.capturistas || [];
        globalCapturistas.forEach(c => { $capturistaSelect.append(`<option value="${c}">${c}</option>`); });
        if (globalCapturistas.length > 0) { $capturistaSelect.val(globalCapturistas[0]); }
    }

    function loadDebt() {
        const idUnidad = document.getElementById('idUnidad').value;
        const btnProcesar = document.getElementById('btn_procesar'); 
        const unitInfo = document.getElementById('unitInfo');
        document.getElementById('debtListContainer').classList.add('hidden');
        btnProcesar.disabled = true;

        if (!idUnidad) {
            document.getElementById('debtList').innerHTML = '<p class="p-3 text-gray-500">Seleccione una unidad para ver sus deudas.</p>';
            unitInfo.textContent = '';
            document.getElementById('totalPendienteLabel').innerHTML = 'Deuda Bruta: <strong class="text-red-600">$0.00</strong>';
            document.getElementById('saldoAFavorLabel').innerHTML = 'Saldo a Favor Disponible: <strong class="text-green-700">$0.00</strong>';
            document.getElementById('montoNetoPendienteLabel').innerHTML = 'Total Neto a Pagar: <strong class="text-red-700">$0.00</strong>';
            calculateBalance();
            return;
        }

        unitInfo.textContent = 'Cargando deudas...';
        
        google.script.run
            .withSuccessHandler(handleDebtLoad)
            .withFailureHandler(function(error) {
                document.getElementById('messages').innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative">Error al cargar deudas: ${error}</div>`;
                unitInfo.textContent = '';
            })
            .getUnitDebt(idUnidad);
    }

    function handleDebtLoad(result) {
        const debtListDiv = document.getElementById('debtList');
        const unitInfo = document.getElementById('unitInfo');
        const montoRecibidoInput = document.getElementById('montoRecibido');
        
        if (result.error) {
            unitInfo.textContent = '';
            document.getElementById('messages').innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative">Error: ${result.error}</div>`;
            debtListDiv.innerHTML = '<p class="p-3 text-gray-500">Error al cargar la deuda.</p>';
            return;
        }
        
        globalUnitDebtData = result;
        unitInfo.textContent = `Propietario: ${result.propietario}`;
        
        document.getElementById('totalPendienteLabel').innerHTML = `Deuda Bruta: <strong class="text-red-600">$${result.totalPendiente.toFixed(2)}</strong>`;
        document.getElementById('saldoAFavorLabel').innerHTML = `Saldo a Favor Disponible: <strong class="text-green-700">$${result.saldoAFavor.toFixed(2)}</strong>`;
        document.getElementById('montoNetoPendienteLabel').innerHTML = `Total Neto a Pagar: <strong class="text-red-700">$${result.montoNetoPendiente.toFixed(2)}</strong>`;

        debtListDiv.innerHTML = '';
        if (result.deudas.length === 0) {
            debtListDiv.innerHTML = '<p class="p-3 text-gray-500 font-bold">No hay deudas pendientes. Cualquier pago generará un saldo a favor.</p>';
        } else {
            result.deudas.forEach((debt, index) => {
                const date = new Date(debt.mesCorte);
                const localDate = new Date(date.getTime() + date.getTimezoneOffset() * 60000);
                const isFine = debt.isFine ? 'text-orange-600' : 'text-blue-600';
                
                const itemHtml = `<div class="debt-item flex justify-between items-center selected" data-index="${index}" data-monto="${debt.montoBase}">
                    <div>
                        <span class="font-bold ${isFine}">${debt.concepto}</span>
                        <span class="text-xs text-gray-500 block">Corte: ${localDate.toLocaleDateString()}</span>
                    </div>
                    <span class="font-bold text-lg">$${debt.montoBase.toFixed(2)}</span>
                </div>`;
                debtListDiv.innerHTML += itemHtml;
            });

            document.querySelectorAll('.debt-item').forEach(item => {
                item.addEventListener('click', toggleDebtSelection);
            });
            document.getElementById('debtListContainer').classList.remove('hidden');
        }

        montoRecibidoInput.value = ""; 
        calculateBalance();
    }

    function toggleDebtSelection(event) {
        const item = event.currentTarget;
        item.classList.toggle('selected');
        calculateBalance();
    }

    function calculateBalance() {
        const montoRecibido = parseFloat(document.getElementById('montoRecibido').value) || 0;
        const saldoAFavorInicial = globalUnitDebtData.saldoAFavor || 0;
        const montoDisponibleParaAplicar = montoRecibido + saldoAFavorInicial;

        let montoTotalDeudasSeleccionadas = 0;
        const selectedDebts = document.querySelectorAll('.debt-item.selected');

        selectedDebts.forEach(item => {
            montoTotalDeudasSeleccionadas += parseFloat(item.dataset.monto);
        });

        const montoAplicadoADeuda = Math.min(montoDisponibleParaAplicar, montoTotalDeudasSeleccionadas);
        const saldoTransaccion = montoDisponibleParaAplicar - montoTotalDeudasSeleccionadas;

        document.getElementById('aplicacionPago').innerHTML = `Monto aplicado a deudas: <strong class="text-blue-600">$${montoAplicadoADeuda.toFixed(2)}</strong>`;
        
        if (saldoTransaccion >= 0) {
            document.getElementById('saldoTransaccion').innerHTML = `Saldo a favor generado: <strong class="text-green-600">$${saldoTransaccion.toFixed(2)}</strong>`;
        } else {
            document.getElementById('saldoTransaccion').innerHTML = `Deuda restante por cubrir: <strong class="text-orange-600">$${Math.abs(saldoTransaccion).toFixed(2)}</strong>`;
        }

        const idUnidad = document.getElementById('idUnidad').value;
        const capturista = usuarioWebRecibido ? document.getElementById('capturistaInput').value : document.getElementById('capturistaSelect').value;
        
        const isMontoValid = montoRecibido > 0 || (montoRecibido === 0 && saldoAFavorInicial > 0); 
        const canSubmit = idUnidad && capturista && isMontoValid;
        
        document.getElementById('btn_procesar').disabled = !canSubmit; 
    }

    function submitPayment(event) {
        event.preventDefault();
        const form = document.getElementById('paymentForm');
        const messagesDiv = document.getElementById('messages');
        const btnProcesar = document.getElementById('btn_procesar'); 
        
        const montoRecibido = parseFloat(document.getElementById('montoRecibido').value) || 0;
        const saldoAFavorInicial = globalUnitDebtData.saldoAFavor || 0;
        const montoDisponibleParaAplicar = montoRecibido + saldoAFavorInicial;

        let montoTotalDeudasSeleccionadas = 0;
        const selectedDebts = document.querySelectorAll('.debt-item.selected');
        const deudasAplicadas = [];

        selectedDebts.forEach(item => {
            const monto = parseFloat(item.dataset.monto);
            montoTotalDeudasSeleccionadas += monto;
            deudasAplicadas.push({ idCargo: globalUnitDebtData.deudas[parseInt(item.dataset.index)].idCargo });
        });
        
        const saldoTransaccion = montoDisponibleParaAplicar - montoTotalDeudasSeleccionadas;
        const saldoFinalGenerado = saldoTransaccion > 0 ? saldoTransaccion : 0;

        const confirmMsg = `Se aplicará un total de $${montoDisponibleParaAplicar.toFixed(2)}.\n\n` +
                             `Deuda cubierta: $${montoTotalDeudasSeleccionadas.toFixed(2)}.\n` +
                             `Nuevo Saldo a Favor: $${saldoFinalGenerado.toFixed(2)}.\n\n` +
                             `¿Desea continuar con el registro?`;
                             
        if (!confirm(confirmMsg)) {
            btnProcesar.disabled = false;
            return;
        }

        btnProcesar.disabled = true;
        btnProcesar.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Procesando...';

        const capturistaDefinitivo = usuarioWebRecibido ? document.getElementById('capturistaInput').value : document.getElementById('capturistaSelect').value;

        const paymentData = {
            idUnidad: form.idUnidad.value,
            montoRecibido: montoRecibido,
            fechaPagoStr: form.fechaPago.value,
            capturista: capturistaDefinitivo,
            deudasAplicadas: deudasAplicadas 
        };

        google.script.run
            .withSuccessHandler(function(response) {
                if (response.success) {
                    lastProcessedIdPago = response.idPago; 
                    
                    // Transición de pantalla a Ticket
                    document.getElementById('areaFormulario').classList.add('hidden');
                    document.getElementById('areaTicket').classList.remove('hidden');
                    
                    // Extraer correo de la unidad para prellenarlo
                    const emailUnidad = $('#idUnidad').select2('data')[0].element.dataset.email;
                    if(emailUnidad) document.getElementById('emailDestino').value = emailUnidad;

                    // Pedir el HTML del ticket y aislarlo en el iFrame
                    google.script.run.withSuccessHandler(htmlResult => {
                        if(htmlResult.success) {
                            document.getElementById('ticketFrame').srcdoc = htmlResult.html;
                        } else {
                            document.getElementById('ticketFrame').srcdoc = '<div style="color:red; text-align:center; margin-top:20px;">Error al dibujar ticket.</div>';
                        }
                    }).generatePaymentTicketHtml(response.idPago, true); // true = formato limpio sin scripts

                } else {
                    messagesDiv.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative">Error: ${response.message}</div>`;
                    btnProcesar.disabled = false;
                    btnProcesar.innerHTML = '<i class="fas fa-check-circle mr-2"></i> Procesar y Generar Ticket';
                }
            })
            .withFailureHandler(function(error) {
                messagesDiv.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative">Error del servidor: ${error}</div>`;
                btnProcesar.disabled = false;
                btnProcesar.innerHTML = '<i class="fas fa-check-circle mr-2"></i> Procesar y Generar Ticket';
            })
            .processPayment(paymentData);
    }

    // --- FUNCIONES DEL ÁREA DEL TICKET ---

    // Imprimir SOLO el iframe (el ticket) para que no salga la webapp entera
    function imprimirTicket() {
        const iframe = document.getElementById('ticketFrame');
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
    }

    function mostrarOpcionCorreo() {
        document.getElementById('cajaCorreo').classList.remove('hidden');
    }

    function enviarTicketPorCorreo() {
        const email = document.getElementById('emailDestino').value.trim();
        const btn = document.getElementById('btnEnviarCorreo');
        const msg = document.getElementById('msgCorreo');

        if(!email || !email.includes('@')) {
            msg.innerText = "Por favor, ingresa un correo válido.";
            msg.className = "text-sm font-bold mt-3 text-center text-red-500 block";
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
        msg.innerText = "Enviando correo...";
        msg.className = "text-sm font-bold mt-3 text-center text-blue-500 block";

        google.script.run.withSuccessHandler(res => {
            btn.disabled = false;
            btn.innerHTML = 'Enviar Correo';
            msg.innerText = res.message;
            msg.className = res.success ? "text-sm font-bold mt-3 text-center text-green-600 block" : "text-sm font-bold mt-3 text-center text-red-600 block";
        }).enviarTicketPorCorreo(lastProcessedIdPago, email);
    }

    function reiniciarFormulario() {
        document.getElementById('paymentForm').reset();
        $('#idUnidad').val(null).trigger('change');
        document.getElementById('fechaPago').value = new Date().toISOString().substring(0, 10);
        document.getElementById('btn_procesar').disabled = true;
        document.getElementById('btn_procesar').innerHTML = '<i class="fas fa-check-circle mr-2"></i> Procesar y Generar Ticket';
        
        // Limpiamos el iframe y ocultamos el ticket
        document.getElementById('ticketFrame').srcdoc = "<div style='text-align:center; padding:20px; color:gray; font-family:sans-serif; font-weight:bold;'><br><br><br>Dibujando ticket...</div>";
        document.getElementById('areaTicket').classList.add('hidden');
        document.getElementById('cajaCorreo').classList.add('hidden');
        document.getElementById('msgCorreo').classList.add('hidden');
        
        // Mostramos el form de nuevo
        document.getElementById('areaFormulario').classList.remove('hidden');
    }

</script>

</body>
</html>
