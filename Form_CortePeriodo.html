<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 10px; }
        .container-box { max-width: 650px; margin: 0 auto; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="container-box p-5 bg-white shadow-xl rounded-xl border-t-8 border-indigo-600 relative">
    
    <div id="pantallaBusqueda">
        <h2 class="text-2xl font-bold text-gray-800 mb-2"><i class="fas fa-calendar-alt mr-2 text-indigo-600"></i>Corte por Período</h2>
        <p class="text-sm text-gray-500 mb-6 border-b pb-4">Genera un reporte de ingresos seleccionando un rango de fechas.</p>
        
        <div class="space-y-4">
            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Desde (Inicio):</label>
                    <input type="date" id="fechaInicio" class="w-full p-3 border-2 border-gray-200 rounded-lg outline-none focus:border-indigo-500 bg-white font-semibold">
                </div>
                <div class="w-1/2">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Hasta (Fin):</label>
                    <input type="date" id="fechaFin" class="w-full p-3 border-2 border-gray-200 rounded-lg outline-none focus:border-indigo-500 bg-white font-semibold">
                </div>
            </div>

            <div class="bg-gray-50 p-3 rounded-lg border border-gray-200 mt-4">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Filtrar por Capturista:</label>
                <div class="flex gap-2">
                    <button onclick="setFiltro('TODOS')" id="btnTodos" class="flex-1 py-2 rounded-md font-bold border-2 border-indigo-600 bg-indigo-600 text-white transition">TODOS</button>
                    <button onclick="setFiltro('MIO')" id="btnMio" class="flex-1 py-2 rounded-md font-bold border-2 border-gray-200 text-gray-500 hover:bg-gray-100 transition">MI CORTE</button>
                </div>
            </div>

            <button onclick="generarCorte()" id="btnGenerar" class="w-full mt-6 bg-indigo-600 text-white font-bold py-4 rounded-lg shadow-lg hover:bg-indigo-700 transition flex justify-center items-center text-lg">
                <i class="fas fa-search-dollar mr-2"></i> CONSULTAR PERÍODO
            </button>
        </div>
    </div>

    <div id="pantallaResultado" class="hidden">
        <div class="flex justify-between items-center mb-4 no-print border-b pb-3">
            <button onclick="volver()" class="text-indigo-600 font-bold hover:bg-indigo-50 px-3 py-1 rounded-lg transition"><i class="fas fa-arrow-left mr-1"></i> Nueva Consulta</button>
            <button onclick="window.print()" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-gray-900 transition"><i class="fas fa-print mr-2"></i> Imprimir Reporte</button>
        </div>

        <div class="text-center mb-6">
            <h3 class="text-xl font-extrabold text-gray-900 uppercase tracking-wider">Reporte de Ingresos</h3>
            <p id="resFecha" class="text-indigo-600 font-bold text-sm mt-1 bg-indigo-50 inline-block px-3 py-1 rounded-full border border-indigo-200"></p>
            <p id="resCapturista" class="text-xs text-gray-500 font-bold uppercase mt-2"></p>
        </div>

        <div class="flex text-xs font-bold text-gray-400 uppercase border-b-2 border-gray-800 pb-2 mb-2 px-2">
            <div class="w-1/4">Fecha</div>
            <div class="w-1/2">Unidad / Concepto</div>
            <div class="w-1/4 text-right">Monto</div>
        </div>

        <div class="space-y-1 mb-6 max-h-[300px] overflow-y-auto pr-2" id="listaPagosCorte">
            </div>

        <div class="bg-green-50 border-2 border-green-200 rounded-xl p-4 text-center shadow-sm">
            <p class="text-sm font-bold text-green-800 uppercase tracking-widest">Total Recaudado del Período</p>
            <p id="resTotal" class="text-4xl font-black text-green-600 mt-1"></p>
        </div>
    </div>
</div>

<script>
    let filtroActivo = "TODOS";
    let usuarioActual = "Sistema";

    window.addEventListener('message', function(event) {
        if(event.data && event.data.usuarioActivo) usuarioActual = event.data.usuarioActivo;
    });

    document.addEventListener('DOMContentLoaded', function() {
        const today = new Date();
        const firstDay = new Date(today.getFullYear(), today.getMonth(), 1); // Primer día del mes
        
        document.getElementById('fechaFin').value = today.toISOString().substring(0, 10);
        document.getElementById('fechaInicio').value = firstDay.toISOString().substring(0, 10);
    });

    function setFiltro(modo) {
        filtroActivo = modo;
        document.getElementById('btnTodos').className = modo === 'TODOS' ? 'flex-1 py-2 rounded-md font-bold border-2 border-indigo-600 bg-indigo-600 text-white transition' : 'flex-1 py-2 rounded-md font-bold border-2 border-gray-200 text-gray-500 hover:bg-gray-100 transition';
        document.getElementById('btnMio').className = modo === 'MIO' ? 'flex-1 py-2 rounded-md font-bold border-2 border-indigo-600 bg-indigo-600 text-white transition' : 'flex-1 py-2 rounded-md font-bold border-2 border-gray-200 text-gray-500 hover:bg-gray-100 transition';
    }

    function generarCorte() {
        const fInicio = document.getElementById('fechaInicio').value;
        const fFin = document.getElementById('fechaFin').value;
        const btn = document.getElementById('btnGenerar');
        const capturistaFiltro = filtroActivo === "MIO" ? usuarioActual : "TODOS";

        if(fInicio > fFin) return alert("La fecha de inicio no puede ser mayor a la fecha de fin.");

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Procesando datos...';

        google.script.run.withSuccessHandler(res => {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-search-dollar mr-2"></i> CONSULTAR PERÍODO';
            
            if(res.pagos.length === 0) return alert("No se encontraron ingresos en este rango de fechas.");

            document.getElementById('pantallaBusqueda').classList.add('hidden');
            document.getElementById('pantallaResultado').classList.remove('hidden');
            
            document.getElementById('resFecha').innerText = `Del ${res.fechaInicioStr} al ${res.fechaFinStr}`;
            document.getElementById('resCapturista').innerText = filtroActivo === "MIO" ? `Filtro: Operaciones de ${usuarioActual}` : "Filtro: Todos los usuarios";
            document.getElementById('resTotal').innerText = `$${res.total.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;

            const lista = document.getElementById('listaPagosCorte');
            lista.innerHTML = "";
            res.pagos.forEach(p => {
                lista.innerHTML += `
                    <div class="flex items-center p-2 border-b border-gray-100 text-sm hover:bg-gray-50 transition">
                        <div class="w-1/4 text-xs font-bold text-gray-500">${p.fechaStr}</div>
                        <div class="w-1/2">
                            <span class="font-bold text-gray-800 block leading-tight">${p.unidad}</span>
                            <span class="text-[10px] text-gray-400 uppercase">${p.capturista} | ${p.concepto}</span>
                        </div>
                        <div class="w-1/4 text-right font-bold text-gray-900">$${p.monto.toLocaleString('es-MX', {minimumFractionDigits: 2})}</div>
                    </div>`;
            });
        }).obtenerDatosCortePeriodoWebApp(fInicio, fFin, capturistaFiltro);
    }

    function volver() {
        document.getElementById('pantallaResultado').classList.add('hidden');
        document.getElementById('pantallaBusqueda').classList.remove('hidden');
    }
</script>
</body>
</html>
